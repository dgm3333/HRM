name: C++ Lint and Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang tools
        run: sudo apt-get update && sudo apt-get install -y clang-format clang-tidy cmake build-essential lcov

      - name: C++ lint
        run: |
          files=$(git ls-files '*.cpp' '*.hpp' '*.cc' '*.hh' '*.h' '*.cxx' '*.hxx')
          if [ -n "$files" ]; then
            clang-format --dry-run --Werror $files
            clang-tidy $files -- -std=c++17
          else
            echo "No C++ files to lint."
          fi

      - name: Build and test
        id: build-test
        run: |
          if [ -f CMakeLists.txt ]; then
            mkdir build && cd build
            cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage" ..
            make
            ctest --output-on-failure --output-junit ctest-report.xml
            cd ..
          else
            echo "No C++ tests found."
          fi

      - name: Collect coverage
        if: ${{ steps.build-test.outcome == 'success' }}
        run: |
          if [ -d build ]; then
            lcov --capture --directory build --output-file coverage.info
            lcov --remove coverage.info '/usr/*' --output-file coverage.info
            genhtml coverage.info --output-directory coverage_html
          else
            echo "No coverage generated."
          fi

      - name: Upload test results
        if: ${{ steps.build-test.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ctest-results
          path: build/ctest-report.xml

      - name: Upload coverage
        if: ${{ steps.build-test.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: ctest-coverage
          path: coverage_html

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install torch

      - name: Smoke evaluation
        run: |
          python scripts/smoke_eval.py > smoke_eval.log

      - name: Upload smoke evaluation log
        uses: actions/upload-artifact@v4
        with:
          name: smoke-eval
          path: smoke_eval.log
