<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Run Detail</title>
</head>
<body>
  <h1>Run <span id="run_id"></span></h1>
  <div>Status: <span id="status"></span></div>
  <div>Artifact: <span id="artifact"></span></div>
  <div id="junit"></div>
  <div>Coverage: <span id="coverage"></span></div>
  <pre id="logs"></pre>
  <script>
    const params = new URLSearchParams(window.location.search);
    const runId = params.get('id');
    document.getElementById('run_id').textContent = runId;

    async function loadRun() {
      const resp = await fetch(`/runs/${runId}`);
      if (!resp.ok) return;
      const run = await resp.json();
      document.getElementById('status').textContent = run.status;
      if (run.artifact) {
        const a = document.createElement('a');
        a.href = run.artifact;
        a.textContent = 'link';
        document.getElementById('artifact').appendChild(a);
      }
    }
    loadRun();

    async function loadJunit() {
      const resp = await fetch(`/runs/${runId}/junit`);
      if (!resp.ok) return;
      const data = await resp.json();
      document.getElementById('junit').textContent =
        `Tests: ${data.tests}, Failures: ${data.failures}`;
    }
    loadJunit();

    async function loadCoverage() {
      const resp = await fetch(`/runs/${runId}/coverage`);
      if (!resp.ok) return;
      const data = await resp.json();
      document.getElementById('coverage').textContent = data.line + '%';
    }
    loadCoverage();

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/logs/ws/${runId}`);
    ws.onmessage = (ev) => {
      const pre = document.getElementById('logs');
      pre.textContent += ev.data + '\n';
      pre.scrollTop = pre.scrollHeight;
    };
  </script>
</body>
</html>
